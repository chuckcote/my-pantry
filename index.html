<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Pantry" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>My Pantry</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #f7f5f0;
      color: #222;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    #splash {
      position: fixed; inset: 0; background: #1a1a2e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 999; transition: opacity 0.4s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-icon { font-size: 64px; }
    #splash-text { color: #e8c97e; font-family: 'Playfair Display', serif; font-size: 28px; }
    #splash-sub  { color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-icon">🥘</div>
    <div id="splash-text">My Pantry</div>
    <div id="splash-sub">Loading…</div>
  </div>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
